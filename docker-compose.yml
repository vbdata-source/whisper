# =============================================================================
# Whisper STT Service -- Coolify Deployment
# =============================================================================
# Drop-in Replacement fuer den alten openai-whisper-Stack.
# Nutzt faster-whisper (int8) -- ~3.5 GB Peak-RAM statt ~10 GB.
# Modell ist ins Image gebaken -- kein Runtime-Download, kein Volume-Overlap.
# =============================================================================

services:
  whisper:
    build:
      context: "https://github.com/vbdata-source/whisper.git#main"
      dockerfile: Dockerfile
      args:
        MODEL_NAME: large-v3
        COMPUTE_TYPE: int8
    image: "vbdata-whisper:latest"
    container_name: "whisper-${COOLIFY_RESOURCE_UUID:-local}"
    restart: unless-stopped

    environment:
      # Whisper-Konfiguration (wird in server.py via os.getenv gelesen)
      WHISPER_MODEL: large-v3
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_DEVICE: cpu
      WHISPER_LANGUAGE: de
      WHISPER_NUM_WORKERS: "1"
      WHISPER_CPU_THREADS: "0"   # 0 = auto

      # Server-Konfiguration
      PORT: "8000"

      # Coolify-Metadata
      COOLIFY_RESOURCE_UUID: "${COOLIFY_RESOURCE_UUID}"
      COOLIFY_CONTAINER_NAME: "whisper-${COOLIFY_RESOURCE_UUID}"

    # KEINE Volume-Mounts mehr fuer /root/.cache/huggingface!
    # Das Modell liegt im Image -- Volume wuerde es nur ueberdecken.
    volumes:
      - "whisper-data:/data"

    networks:
      - coolify

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # 90s reichen -- Modell ist im Image

    labels:
      - coolify.managed=true
      - coolify.type=service
      - "coolify.name=whisper-${COOLIFY_RESOURCE_UUID}"
      # Traefik: HTTPS via Let's Encrypt
      - traefik.enable=true
      - "traefik.http.routers.whisper.rule=Host(`whisper.vbdata-cloud.at`)"
      - traefik.http.routers.whisper.entrypoints=https
      - traefik.http.routers.whisper.tls=true
      - traefik.http.routers.whisper.tls.certresolver=letsencrypt
      - traefik.http.services.whisper.loadbalancer.server.port=8000

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G        # deutlich weniger noetig mit faster-whisper int8
        reservations:
          memory: 3G

volumes:
  whisper-data:
    name: "${COOLIFY_RESOURCE_UUID:-local}_whisper-data"

networks:
  coolify:
    external: true
    name: coolify
